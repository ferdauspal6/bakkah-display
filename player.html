<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bakkah Display — Player</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/src/styles/app.css">
  <script type="module" src="/src/player/app.js"></script>
</head>
<body class="player-body" x-data="player">
  <template x-if="error">
    <div class="h-screen flex flex-col items-center justify-center text-center p-8">
      <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="1.5" class="mb-6 opacity-60">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <h2 class="text-xl font-semibold text-[#0f172a] mb-2">Display Error</h2>
      <p class="text-[#94a3b8]" x-text="error"></p>
    </div>
  </template>

  <template x-if="!error">
    <div class="h-screen flex flex-col">
      <!-- Header: 5% -->
      <header class="player-header flex-shrink-0">
        <div class="flex items-center gap-3">
          <div class="w-7 h-7 rounded-md bg-[#10b981] flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><rect x="3" y="3" width="18" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
          </div>
          <span class="text-sm font-medium text-[#0f172a]" x-text="display?.name || 'Bakkah Display'"></span>
        </div>
        <div class="flex items-center gap-6 text-right">
          <div>
            <div class="text-2xl font-bold text-[#0f172a] tabular-nums" x-text="currentTime"></div>
            <div class="text-xs text-[#94a3b8]" x-text="currentDate"></div>
          </div>
        </div>
      </header>

      <!-- Content: 90% -->
      <main class="player-content flex-shrink-0">
        <div x-ref="slideContainer" class="w-full h-full"></div>
      </main>

      <!-- Footer: 5% -->
      <footer class="player-footer flex-shrink-0">
        <div class="flex items-center gap-4">
          <template x-for="prayer in prayerTimes" :key="prayer.name">
            <div class="prayer-item">
              <div class="text-xs text-[#94a3b8] uppercase tracking-wider" x-text="prayer.name"></div>
              <div class="text-sm font-semibold text-[#0f172a]" x-text="prayer.time"></div>
            </div>
          </template>
        </div>
        <div class="flex items-center gap-3">
          <span class="text-xs text-[#94a3b8]">Next slide in</span>
          <span class="countdown-digits" x-text="countdown"></span>
        </div>
      </footer>
    </div>
  </template>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    [x-cloak] { display: none !important; }
  </style>
</body>
</html>

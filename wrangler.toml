name = "bakkah-display"
compatibility_date = "2024-10-22"
pages_build_output_dir = "./dist"

[[d1_databases]]
binding = "D1_BACKEND"
database_name = "bakkah-display-db"
database_id = ""

[[routes]]
pattern = "bakkah-display.pages.dev/*"
zone_id = ""

[env.production]
vars = { ENVIRONMENT = "production" }
